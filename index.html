<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy  Birthday</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
height:200vh;
overflow-x:hidden;
display:flex;
flex-direction:column;
align-items:center;
background:#ffe6f0;
font-family:Arial;
scroll-behavior:smooth;
}

/* MOBILE */

@media(max-width:600px){

#countdown{font-size:70px;}

.cake{transform:scale(.8);}

.message-section{
font-size:18px;
padding:25px;
}

}

/* SECTION */

.animation-section{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* COUNTDOWN */

#countdown{
position:fixed;
font-size:120px;
font-weight:bold;
color:#ff2e63;
z-index:1000;
}

/* CAKE */

.cake{
position:relative;
width:300px;
height:300px;
opacity:0;
}

/* PLATE */

.plate{
position:absolute;
bottom:-14px;
width:320px;
height:26px;
background:#e5e5e5;
border-radius:60px;
left:-10px;
}

/* CAKE LAYERS */

.layer{
position:absolute;
width:260px;
height:55px;
left:20px;
border-radius:14px;
transform:translateY(-350px);
}

.layer1{background:#ff9aa2;bottom:0;}
.layer2{background:#ffb7b2;bottom:55px;}
.layer3{background:#ffdac1;bottom:110px;z-index:8;}

/* FROSTING */

.frosting{
position:absolute;
width:260px;
height:22px;
background:white;
border-radius:14px;
left:20px;
bottom:165px;
transform:translateY(-350px);
z-index:10;
}

/* CANDLE */

.candle{
width:12px;
height:60px;
background:#3498db;
position:absolute;
left:144px;
bottom:140px;
transform:translateY(-350px);
z-index:5;
border-radius:4px;
cursor:pointer;
}

/* FLAME */

.flame{
width:14px;
height:14px;
background:orange;
border-radius:50%;
position:absolute;
top:-14px;
animation:flicker .2s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.3);}
}

/* SMOKE */

.smoke{
position:absolute;
width:10px;
height:10px;
background:gray;
border-radius:50%;
top:-15px;
left:1px;
opacity:0;
}

.blow .flame{display:none;}
.blow .smoke{animation:smokeRise 2s forwards;}

@keyframes smokeRise{
0%{opacity:.8;transform:translateY(0)}
100%{opacity:0;transform:translateY(-40px) scale(2)}
}

/* NUMBER */

.number{
position:absolute;
left:50%;
transform:translateX(-50%) translateY(-350px);
bottom:230px;
font-size:80px;
font-weight:bold;
color:#ff2e63;
z-index:20;
}

.number sup{font-size:35px}

/* DROP ANIMATION */

.start .layer1{animation:dropBounce 1s forwards}
.start .layer2{animation:dropBounce 1s forwards .8s}
.start .layer3{animation:dropBounce 1s forwards 1.6s}
.start .frosting{animation:dropBounce 1s forwards 2.4s}
.start .candle{animation:dropBounce 1s forwards 3.2s}
.start .number{animation:dropBounce 1s forwards 4s}

@keyframes dropBounce{
0%{transform:translateY(-350px)}
70%{transform:translateY(15px)}
100%{transform:translateY(0)}
}

/* FIREWORKS */

.fireworks{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}

.spark{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
opacity:0;
}

.blowFireworks .spark{
animation:burst 1s ease-out forwards;
}

.spark:nth-child(1){background:#ff4d6d;--x:120px;--y:-60px}
.spark:nth-child(2){background:#ffcc00;--x:-120px;--y:-60px}
.spark:nth-child(3){background:#00e5ff;--x:80px;--y:80px}
.spark:nth-child(4){background:#7cff00;--x:-80px;--y:80px}
.spark:nth-child(5){background:#ff66ff;--x:150px;--y:20px}
.spark:nth-child(6){background:#ff884d;--x:-150px;--y:20px}
.spark:nth-child(7){background:#00ffcc;--x:40px;--y:-120px}
.spark:nth-child(8){background:#fff;--x:-40px;--y:-120px}

@keyframes burst{
0%{transform:translate(0,0);opacity:1}
100%{transform:translate(var(--x),var(--y));opacity:0}
}

/* CONFETTI */

.confetti{
position:fixed;
width:8px;
height:8px;
top:-10px;
animation:confettiFall linear forwards;
}

@keyframes confettiFall{
to{transform:translateY(110vh) rotate(720deg)}
}

/* HEARTS */

.heart{
position:fixed;
width:20px;
height:20px;
background:#ff4d6d;
transform:rotate(45deg);
bottom:-20px;
animation:floatUp linear forwards;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:20px;
height:20px;
background:inherit;
border-radius:50%;
}

.heart:before{top:-10px}
.heart:after{left:-10px}

@keyframes floatUp{
to{transform:translateY(-110vh) rotate(45deg);opacity:0}
}

/* POPUP */

#wishPopup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px 40px;
border-radius:10px;
font-size:24px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
display:none;
z-index:2000;
}

/* MESSAGE SECTION */

.message-section{
width:95%;
max-width:1100px;
padding:40px;
margin:60px auto;
border-radius:20px;
text-align:center;
color:white;
background:rgba(0,0,0,.8);
box-shadow:0 10px 30px rgba(0,0,0,.3);
position:relative;
overflow:hidden;
min-height:120vh;
}

#typingText{
position:relative;
z-index:5;
font-size:20px;
line-height:1.6;
margin-top:20px;
}

/* GALLERY */

.gallery{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
z-index:1;
}

.gallery-img{
width:100%;
height:200px;
object-fit:cover;
border-radius:12px;
opacity:.35;
transform:scale(.8);
transition:all .8s ease;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.gallery-img.show{
opacity:.35;
transform:scale(1);
}

</style>
</head>

<body>

<div id="wishPopup">✨ Make a wish ✨</div>

<div class="animation-section">

<div id="countdown">3</div>

<div class="cake" id="cake">


<div class="layer layer1"></div>
<div class="layer layer2"></div>
<div class="layer layer3"></div>

<div class="frosting"></div>

<div class="candle" id="candle">
<div class="flame"></div>
<div class="smoke"></div>
</div>

<div class="plate"></div>

</div>

<div class="fireworks">
<span class="spark"></span>
<span class="spark"></span>
<span class="spark"></span>
<span class="spark"></span>
<span class="spark"></span>
<span class="spark"></span>
<span class="spark"></span>
<span class="spark"></span>
</div>

</div>

<div class="message-section">

<h2 style="position:relative;z-index:5;">Happy Birthday 💖</h2>

<p id="typingText"></p>

<div class="gallery">

<img src="WhatsApp Image 2026-03-23 at 8.55.01 PM.jpeg" class="gallery-img">
<img src="WhatsApp Image 2026-03-23 at 8.55.02 PM (1).jpeg" class="gallery-img">
<img src="WhatsApp Image 2026-03-23 at 8.55.02 PM (2).jpeg" class="gallery-img">
<img src="WhatsApp Image 2026-03-23 at 8.55.02 PM.jpeg" class="gallery-img">
<img src="WhatsApp Image 2026-03-23 at 8.55.03 PM (1).jpeg" class="gallery-img">
<img src="WhatsApp Image 2026-03-23 at 8.55.03 PM.jpeg" class="gallery-img">
<img src="WhatsApp Image 2026-03-23 at 8.58.03 PM (1).jpeg" class="gallery-img">
<img src="WhatsApp Image 2026-03-23 at 8.58.03 PM (2).jpeg" class="gallery-img">
<img src="WhatsApp Image 2026-03-23 at 8.58.03 PM.jpeg" class="gallery-img">
<img src="WhatsApp Image 2026-03-23 at 8.58.04 PM.jpeg" class="gallery-img">
<img src="WhatsApp Image 2026-03-23 at 8.59.17 PM.jpeg" class="gallery-img">
<img src="WhatsApp Image 2026-03-23 at 8.58.03 PM.jpeg" class="gallery-img">
<img src="WhatsApp Image 2026-03-23 at 9.06.40 PM.jpeg" class="gallery-img">
<img src="WhatsApp Image 2026-03-23 at 9.06.37 PM.jpeg" class="gallery-img">
<img src="WhatsApp Image 2026-03-23 at 9.06.36 PM.jpeg" class="gallery-img">


</div>
</div>

<script>

/* COUNTDOWN */

let count=3
const counter=document.getElementById("countdown")
const cake=document.getElementById("cake")

const timer=setInterval(()=>{

count--
counter.textContent=count

if(count===0){

clearInterval(timer)
counter.style.display="none"

cake.style.opacity="1"
cake.classList.add("start")

startConfettiRain()
startHeartFloat()

setTimeout(typeWriter,6000)
setTimeout(showGalleryImages,6500)

setTimeout(()=>{
document.querySelector(".message-section")
.scrollIntoView({behavior:"smooth"})
},5500)

}

},1000)

/* CANDLE */

const candle=document.getElementById("candle")
const popup=document.getElementById("wishPopup")

candle.addEventListener("click",()=>{

candle.classList.add("blow")
document.querySelector(".fireworks").classList.add("blowFireworks")

createConfettiBurst()

popup.style.display="block"

setTimeout(()=>{
popup.style.display="none"
},3000)

})

/* CONFETTI BURST */

function createConfettiBurst(){

for(let i=0;i<80;i++){

const confetti=document.createElement("div")
confetti.classList.add("confetti")

const colors=["#ff4d6d","#ffcc00","#00e5ff","#7cff00","#ff66ff"]

confetti.style.background=colors[Math.floor(Math.random()*colors.length)]
confetti.style.left=Math.random()*100+"vw"

document.body.appendChild(confetti)

setTimeout(()=>{
confetti.remove()
},4000)

}

}

/* CONFETTI RAIN */

function startConfettiRain(){

setInterval(()=>{

const confetti=document.createElement("div")
confetti.classList.add("confetti")

const colors=["#ff4d6d","#ffcc00","#00e5ff","#7cff00","#ff66ff","#fff"]

confetti.style.background=colors[Math.floor(Math.random()*colors.length)]
confetti.style.left=Math.random()*100+"vw"
confetti.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(confetti)

setTimeout(()=>{
confetti.remove()
},6000)

},120)

}

/* HEART FLOAT */

function startHeartFloat(){

setInterval(()=>{

const heart=document.createElement("div")
heart.classList.add("heart")

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(Math.random()*4+4)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},7000)

},600)

}

/* MESSAGE */

const message=`Happy Birthday ❤️

Happy Birthday to my dearest sister 🎂💖

Growing up with you gave me some of the most beautiful memories of my life. From the  playing and laughing over the smallest things — those days will always stay close to my heart. Now that you are far away in another country, I realize even more how special those moments were.

Birthdays used to mean celebrating together at home, but today the distance makes me miss you even more. Still, I’m so proud of you for being brave, chasing your dreams, and creating your own path in a different place.

I truly miss those childhood days we spent together. Sometimes I wish we could go back just for a moment — to laugh like we used to and make more memories like before. Even though miles separate us now, our bond will always stay the same.

I hope your birthday is filled with happiness, success, and beautiful moments. May life give you everything your heart wishes for.

Happy Birthday once again.
Missing you a lot from here and sending you the biggest hug across the distance. 🎈🤍
`

let i=0
const speed=40
const typingElement=document.getElementById("typingText")

function typeWriter(){

if(i<message.length){

typingElement.innerHTML+=message.charAt(i)
i++

setTimeout(typeWriter,speed)

}

}

/* GALLERY */

function showGalleryImages(){

const images=document.querySelectorAll(".gallery-img")

images.forEach((img,index)=>{

setTimeout(()=>{
img.classList.add("show")
},index*500)

})

}

</script>

</body>
</html>
